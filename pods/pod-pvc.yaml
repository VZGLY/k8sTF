apiVersion: v1
kind: Pod
metadata:
  name: pvc-pod

spec:
  volumes:
    - name: config
      configMap:
        name: new-pvc
  containers:
    - name: nginx-pvc
      image: httpd:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: "/usr/local/apache2/htdocs"
          name: config
