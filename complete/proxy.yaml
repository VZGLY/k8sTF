apiVersion: v1
kind: Service
metadata:
  name: reverse-proxy-nodeport
  labels:
    app: nginx-proxy
spec:
  selector:
    app: nginx
    env: dev
  type: NodePort
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
      nodePort: 30080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      env: dev
  template:
    metadata:
      name: nginx-reverse-proxy
      labels:
        app: nginx
        env: dev
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: '100m'
              memory: '50Mi'
            limits:
              cpu: '200m'
              memory: '100Mi'

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-reverse-proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reverse-proxy
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30   # attendre 30 sec au lieu de 5
      policies:
        - type: Pods
          value: 2                        # supprimer max 2 pods à la fois
          periodSeconds: 5              # par tranche de
    scaleUp:
      stabilizationWindowSeconds: 0      # scale-up immédiat
      policies:
        - type: Pods
          value: 4                        # ajouter max 4 pods à la fois
          periodSeconds: 5

--- 

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-reverse-proxy
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reverse-proxy
  updatePolicy:
    updateMode: "Recreate"
  resourcePolicy:
    containerPolicies:
      - containerName: nginx
        minAllowed:
          cpu: "100m"
          memory: "50Mi"
        maxAllowed:
          cpu: "1000m"
          memory: "500Mi"
